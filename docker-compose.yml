services:
  mariadb:
    image: mariadb:11
    container_name: travel_mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: sapassword
      MARIADB_DATABASE: travel_booking
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./Booking_Service/database.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - soa_network

  user-service:
    build: ./user-service
    container_name: user_service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      PORT: 8081
      DB_HOST: mariadb
      DB_USER: root
      DB_PASS: sapassword
      DB_NAME: travel_booking
      DB_PORT: 3306
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - soa_network

  tour-service:
    build: ./tourService
    container_name: tour_service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      PORT: 8082
    networks:
      - soa_network

  booking-service:
    build: ./Booking_Service
    container_name: booking_service
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      PORT: 8083
      DB_HOST: mariadb
      DB_USER: root
      DB_PASS: sapassword
      DB_NAME: travel_booking
      DB_PORT: 3306
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - soa_network

  payment-service:
    build: ./Payment_Service
    container_name: payment_service
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      PORT: 8084
    networks:
      - soa_network

  orchestrator:
    build: ./orchestration
    container_name: orchestrator
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      USER_SERVICE_URL: http://user-service:8081
      TOUR_SERVICE_URL: http://tour-service:8082
      BOOKING_SERVICE_URL: http://booking-service:8083
      PAYMENT_SERVICE_URL: http://payment-service:8084
      FRONTEND_ORIGIN: "*"
    depends_on:
      - user-service
      - tour-service
      - booking-service
      - payment-service
    networks:
      - soa_network

  front-end:
    build:
      context: ./front-end
      target: dev
    container_name: front_end
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8080
    volumes:
      - ./front-end:/app
      - /app/node_modules
    depends_on:
      - orchestrator
    networks:
      - soa_network

volumes:
  mariadb_data:

networks:
  soa_network:
    driver: bridge
